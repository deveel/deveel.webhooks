name: Publish Packages

on:
  workflow_call:
    inputs:
      publish-to-nuget:
        description: 'Whether to publish packages to NuGet.org'
        required: true
        type: boolean
        default: false
      build-configuration:
        description: 'Build configuration to use'
        required: false
        type: string
        default: 'Release'
      version:
        description: 'Optional version override to force package and assembly versions'
        required: false
        type: string
        default: ''

permissions:
  contents: read
  packages: write

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  publish:
    name: "Pack and Publish Packages"
    runs-on: ubuntu-latest
    
    outputs:
      version: ${{ steps.effective-version.outputs.semver }}
      nuget-version: ${{ steps.effective-version.outputs.nuget_version }}
      assembly-version: ${{ steps.effective-version.outputs.assembly_semver }}
      file-version: ${{ steps.effective-version.outputs.assembly_filever }}
      informational-version: ${{ steps.effective-version.outputs.informational_version }}
      packages-published-to-nuget: ${{ steps.publish-nuget.outputs.published }}
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install GitVersion
      uses: gittools/actions/gitversion/setup@v4.0.1
      with:
        versionSpec: '6.x'
    
    - name: Determine Version
      id: gitversion
      uses: gittools/actions/gitversion/execute@v4.0.1
      with:
        useConfigFile: true

    - name: Resolve effective version values
      id: effective-version
      shell: pwsh
      run: |
        $manualVersion = "${{ inputs.version }}".Trim()
        if ($manualVersion.StartsWith('v')) {
          $manualVersion = $manualVersion.Substring(1)
        }

        if ($manualVersion) {
          if ($manualVersion -notmatch '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$') {
            throw "Invalid version format '$manualVersion'. Expected semantic version like 1.2.3 or 1.2.3-beta.1"
          }

          $assemblyBase = ($manualVersion -replace '[-+].*$', '')
          $assemblyVersion = "$assemblyBase.0"

          "semver=$manualVersion" >> $env:GITHUB_OUTPUT
          "nuget_version=$manualVersion" >> $env:GITHUB_OUTPUT
          "assembly_semver=$assemblyVersion" >> $env:GITHUB_OUTPUT
          "assembly_filever=$assemblyVersion" >> $env:GITHUB_OUTPUT
          "informational_version=$manualVersion" >> $env:GITHUB_OUTPUT
        } else {
          "semver=${{ steps.gitversion.outputs.SemVer }}" >> $env:GITHUB_OUTPUT
          "nuget_version=${{ steps.gitversion.outputs.NuGetVersion }}" >> $env:GITHUB_OUTPUT
          "assembly_semver=${{ steps.gitversion.outputs.AssemblySemVer }}" >> $env:GITHUB_OUTPUT
          "assembly_filever=${{ steps.gitversion.outputs.AssemblySemFileVer }}" >> $env:GITHUB_OUTPUT
          "informational_version=${{ steps.gitversion.outputs.InformationalVersion }}" >> $env:GITHUB_OUTPUT
        }

    - name: Display Version Information
      run: |
        echo "🏷️ Version: ${{ steps.effective-version.outputs.semver }}"
        echo "📦 NuGet Version: ${{ steps.effective-version.outputs.nuget_version }}"
        echo "🔢 Assembly Version: ${{ steps.effective-version.outputs.assembly_semver }}"
        echo "📄 File Version: ${{ steps.effective-version.outputs.assembly_filever }}"
        echo "ℹ️ Informational Version: ${{ steps.effective-version.outputs.informational_version }}"
        echo "🚀 Publish to NuGet: ${{ inputs.publish-to-nuget }}"

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          8.0.x
          9.0.x
          10.0.x

    - name: Restore Dependencies
      run: dotnet restore

    - name: Pack Packages
      run: dotnet pack --configuration ${{ inputs.build-configuration }} --include-symbols --output ./nuget
      env:
        GitVersion_SemVer: ${{ steps.effective-version.outputs.semver }}
        GitVersion_AssemblySemVer: ${{ steps.effective-version.outputs.assembly_semver }}
        GitVersion_AssemblySemFileVer: ${{ steps.effective-version.outputs.assembly_filever }}
        GitVersion_InformationalVersion: ${{ steps.effective-version.outputs.informational_version }}
        GitVersion_NuGetVersion: ${{ steps.effective-version.outputs.nuget_version }}

    - name: List Generated Packages
      run: |
        echo "📋 Generated packages:"
        ls -la ./nuget/

    - name: Publish to GitHub Packages
      run: |
        echo "📤 Publishing packages to GitHub Packages..."
        dotnet nuget push ./nuget/**/*.nupkg \
          --skip-duplicate \
          --api-key ${{ secrets.GITHUB_TOKEN }} \
          --source "https://nuget.pkg.github.com/deveel/index.json"
        echo "✅ Successfully published to GitHub Packages"

    - name: Publish to NuGet.org
      id: publish-nuget
      if: inputs.publish-to-nuget == true
      run: |
        echo "📤 Publishing packages to NuGet.org..."
        if [ -z "${{ secrets.NUGET_API_KEY }}" ]; then
          echo "❌ NUGET_API_KEY secret is not set"
          exit 1
        fi
        
        dotnet nuget push ./nuget/**/*.nupkg \
          --skip-duplicate \
          --api-key ${{ secrets.NUGET_API_KEY }} \
          --source https://api.nuget.org/v3/index.json
        
        echo "✅ Successfully published to NuGet.org"
        echo "published=true" >> $GITHUB_OUTPUT

    - name: Upload Package Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nuget-packages-${{ steps.effective-version.outputs.nuget_version }}
        path: ./nuget/*.nupkg
        retention-days: 7

  summary:
    needs: publish
    runs-on: ubuntu-latest
    steps:
    - name: Publish Summary
      run: |
        echo "## 📦 Package Publishing Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
        echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| Version | \`${{ needs.publish.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| NuGet Version | \`${{ needs.publish.outputs.nuget-version }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| Published to GitHub | ✅ |" >> $GITHUB_STEP_SUMMARY
        echo "| Published to NuGet.org | ${{ inputs.publish-to-nuget == true && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ "${{ inputs.publish-to-nuget }}" == "true" ]; then
          echo "🎉 Packages have been published to both GitHub Packages and NuGet.org!" >> $GITHUB_STEP_SUMMARY
        else
          echo "📦 Packages have been published to GitHub Packages only." >> $GITHUB_STEP_SUMMARY
        fi