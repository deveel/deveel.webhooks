name: Release Workflow

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Release version to force on assemblies and packages (for example 1.2.3 or 1.2.3-beta.1)
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  ci:
    uses: ./.github/workflows/reusable-ci.yml
    with:
      publish-to-github: true
      publish-to-nuget: true
      upload-codecov: false
      version: ${{ github.event_name == 'workflow_dispatch' && inputs.version || '' }}
    secrets: inherit


