name: Reusable CI

on:
  workflow_call:
    inputs:
      publish-to-github:
        description: Publish packages to GitHub Packages
        required: false
        type: boolean
        default: false
      publish-to-nuget:
        description: Publish packages to NuGet.org
        required: false
        type: boolean
        default: false
      upload-codecov:
        description: Upload test coverage to Codecov
        required: false
        type: boolean
        default: false
      build-configuration:
        description: Build configuration
        required: false
        type: string
        default: Release
    secrets:
      codecov_token:
        description: Optional Codecov token
        required: false

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-test:
    name: Build and Test (${{ matrix.os }} - ${{ matrix.dotnet-framework }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: true
      matrix:
        include:
          - dotnet: 8.0.x
            dotnet-framework: net8.0
            os: ubuntu-latest
          - dotnet: 8.0.x
            dotnet-framework: net8.0
            os: windows-latest
          - dotnet: 9.0.x
            dotnet-framework: net9.0
            os: ubuntu-latest
          - dotnet: 9.0.x
            dotnet-framework: net9.0
            os: windows-latest
          - dotnet: 10.0.x
            dotnet-framework: net10.0
            os: ubuntu-latest
          - dotnet: 10.0.x
            dotnet-framework: net10.0
            os: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4
        with:
          versionSpec: 6.x

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4

      - name: Resolve effective version values
        id: effective-version
        shell: pwsh
        run: |
          "semver=${{ steps.gitversion.outputs.SemVer }}" >> $env:GITHUB_OUTPUT
          "nuget_version=${{ steps.gitversion.outputs.NuGetVersionV2 }}" >> $env:GITHUB_OUTPUT
          "assembly_semver=${{ steps.gitversion.outputs.AssemblySemVer }}" >> $env:GITHUB_OUTPUT
          "assembly_filever=${{ steps.gitversion.outputs.AssemblySemFileVer }}" >> $env:GITHUB_OUTPUT
          "informational_version=${{ steps.gitversion.outputs.InformationalVersion }}" >> $env:GITHUB_OUTPUT

      - name: Setup .NET ${{ matrix.dotnet }}
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: Restore dependencies
        run: dotnet restore -p:TargetFramework=${{ matrix.dotnet-framework }}

      - name: Build
        run: dotnet build --no-restore -c ${{ inputs.build-configuration }} -f ${{ matrix.dotnet-framework }}
        env:
          GitVersion_SemVer: ${{ steps.effective-version.outputs.semver }}
          GitVersion_AssemblySemVer: ${{ steps.effective-version.outputs.assembly_semver }}
          GitVersion_AssemblySemFileVer: ${{ steps.effective-version.outputs.assembly_filever }}
          GitVersion_InformationalVersion: ${{ steps.effective-version.outputs.informational_version }}
          GitVersion_NuGetVersion: ${{ steps.effective-version.outputs.nuget_version }}

      - name: Test (Ubuntu, no coverage)
        if: startsWith(matrix.os, 'ubuntu') && inputs.upload-codecov == false
        run: dotnet test --no-build -c ${{ inputs.build-configuration }} -f ${{ matrix.dotnet-framework }}

      - name: Test (Ubuntu, with coverage)
        if: startsWith(matrix.os, 'ubuntu') && inputs.upload-codecov == true
        run: dotnet test --no-build -c ${{ inputs.build-configuration }} -f ${{ matrix.dotnet-framework }} -- --coverage --coverage-output-format cobertura

      - name: Test (Windows, no coverage)
        if: startsWith(matrix.os, 'windows') && inputs.upload-codecov == false
        run: dotnet test --no-build -c ${{ inputs.build-configuration }} -f ${{ matrix.dotnet-framework }} --filter "DB!=SQLServer"

      - name: Test (Windows, with coverage)
        if: startsWith(matrix.os, 'windows') && inputs.upload-codecov == true
        run: dotnet test --no-build -c ${{ inputs.build-configuration }} -f ${{ matrix.dotnet-framework }} --filter "DB!=SQLServer" -- --coverage --coverage-output-format cobertura

      - name: Upload to Codecov
        if: inputs.upload-codecov == true
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.WEBHOOKS_CODECOV_TOKEN }}
          files: "**/TestResults/**/*.cobertura.xml"
          fail_ci_if_error: false
          
  publish:
    needs: [build-test]
    if: inputs.publish-to-github == true || inputs.publish-to-nuget == true
    uses: ./.github/workflows/publish.yml
    with:
      publish-to-nuget: ${{ inputs.publish-to-nuget }}
      build-configuration: ${{ inputs.build-configuration }}
    secrets: inherit
